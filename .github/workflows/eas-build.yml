name: iOS Build & TestFlight
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Install Fastlane
        run: gem install fastlane

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Setup App Store Connect API Key
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.ASC_API_KEY_P8 }}" > ~/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8

      - name: Import Distribution Certificate
        env:
          CERT_P12_BASE64: ${{ secrets.DIST_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
        run: |
          # Create keychain (same as fastlane setup_ci)
          KC_PATH="$HOME/Library/Keychains/fastlane_tmp_keychain-db"
          security create-keychain -p "" fastlane_tmp_keychain || true
          security unlock-keychain -p "" fastlane_tmp_keychain || true
          security set-keychain-settings -lut 7200 fastlane_tmp_keychain || true

          # Decode and import p12
          printf '%s' "$CERT_P12_BASE64" | base64 --decode > /tmp/dist.p12
          ls -la /tmp/dist.p12
          security import /tmp/dist.p12 -k "$KC_PATH" -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KC_PATH"

          # Verify
          echo "=== Signing identities ==="
          security find-identity -v -p codesigning "$KC_PATH"
          rm /tmp/dist.p12

      - name: List ios directory
        run: ls -la ios/

      - name: Find workspace and scheme
        run: |
          echo "=== ios/ contents ==="
          ls -la ios/
          WS=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          SCHEME=$(basename "$WS" .xcworkspace)
          PROJ=$(find ios -name "*.xcodeproj" -maxdepth 1 | head -1)
          echo "XCODE_WS=$WS" >> $GITHUB_ENV
          echo "XCODE_SCHEME=$SCHEME" >> $GITHUB_ENV
          echo "XCODE_PROJ=$PROJ" >> $GITHUB_ENV
          echo "Found: WS=$WS SCHEME=$SCHEME PROJ=$PROJ"

      - name: Build & Upload with Fastlane
        env:
          ASC_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
          ASC_KEY_PATH: ~/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8
          FL_WORKSPACE: ${{ env.XCODE_WS }}
          FL_SCHEME: ${{ env.XCODE_SCHEME }}
          FL_PROJECT: ${{ env.XCODE_PROJ }}
        run: fastlane release

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-ipa
          path: ios/*.ipa
