workflows:
  # === iOS Build & App Store Submit ===
  ios-production:
    name: iOS Production
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Minikapp
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.kasik.ekgida
      vars:
        BUNDLE_ID: "com.kasik.ekgida"
      node: 18
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          npm ci
      - name: Set up Expo
        script: |
          npx expo prebuild --platform ios --clean
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "ios/kasikapp.xcworkspace" \
            --scheme "kasikapp"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  # === Android Build & Google Play Submit ===
  android-production:
    name: Android Production
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      groups:
        - google_play_credentials
      vars:
        PACKAGE_NAME: "com.kasik.ekgida"
      node: 18
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          npm ci
      - name: Set up Expo
        script: |
          npx expo prebuild --platform android --clean
      - name: Build Android AAB
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
