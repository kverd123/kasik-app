workflows:
  # === iOS Build & App Store Submit ===
  ios-production:
    name: iOS Production
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      ios_signing:
        provisioning_profiles:
          - profile: kasik
        certificates:
          - certificate: kasik
      vars:
        BUNDLE_ID: "com.kasik.ekgida"
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          npm ci
      - name: Set up Expo
        script: |
          npx expo prebuild --platform ios --clean
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Find workspace and scheme
        script: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" -json | python3 -c "import sys,json; print(json.load(sys.stdin)['workspace']['schemes'][0])")
          echo "WORKSPACE=$WORKSPACE" >> $CM_ENV
          echo "SCHEME=$SCHEME" >> $CM_ENV
          echo "Using workspace: $WORKSPACE, scheme: $SCHEME"
      - name: Build iOS archive
        script: |
          xcodebuild -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/ios/KasikApp.xcarchive \
            archive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            | xcpretty || true
      - name: Export IPA
        script: |
          # Create proper export options plist
          /usr/libexec/PlistBuddy -c "Add :method string app-store-connect" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :teamID string $APP_STORE_CONNECT_TEAM_ID" /tmp/ExportOptions.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :uploadBitcode bool false" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :uploadSymbols bool true" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :signingStyle string manual" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:$BUNDLE_ID string kasik" /tmp/ExportOptions.plist

          xcodebuild -exportArchive \
            -archivePath build/ios/KasikApp.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            COMPILER_INDEX_STORE_ENABLE=NO
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/KasikApp.xcarchive
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  # === Android Build & Google Play Submit ===
  android-production:
    name: Android Production
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      groups:
        - google_play_credentials
      vars:
        PACKAGE_NAME: "com.kasik.ekgida"
      node: 20
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          npm ci
      - name: Set up Expo
        script: |
          npx expo prebuild --platform android --clean
      - name: Build Android AAB
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
