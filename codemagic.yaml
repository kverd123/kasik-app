workflows:
  # === iOS Build & TestFlight ===
  ios-production:
    name: iOS Production
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.kasik.ekgida
      vars:
        BUNDLE_ID: "com.kasik.ekgida"
        EXPO_PUBLIC_FIREBASE_API_KEY: "AIzaSyBkgx0FNXB2bX6AmkU4eOM5VYVoIGEYsag"
        EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: "kasik-1f982.firebaseapp.com"
        EXPO_PUBLIC_FIREBASE_PROJECT_ID: "kasik-1f982"
        EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: "kasik-1f982.firebasestorage.app"
        EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "95500135299"
        EXPO_PUBLIC_FIREBASE_APP_ID: "1:95500135299:ios:a2a3d3e5f6g7h8i9"
        EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID: "95500135299-d1s02fuebgd5hahrsblla2b4g09p3lk8.apps.googleusercontent.com"
        EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: "95500135299-d1s02fuebgd5hahrsblla2b4g09p3lk8.apps.googleusercontent.com"
        EXPO_PUBLIC_ADMOB_APP_ID_IOS: "ca-app-pub-8099877386187148~1136119394"
        EXPO_PUBLIC_ADMOB_BANNER_ID_IOS: "ca-app-pub-8099877386187148/3160748553"
        EXPO_PUBLIC_ADMOB_INTERSTITIAL_ID_IOS: "ca-app-pub-8099877386187148/2055416996"
        EXPO_PUBLIC_REVENUECAT_API_KEY: "appl_kOTQHVFKEfnenNdYfeQyYpHBVSM"
        EXPO_PUBLIC_AI_API_KEY: "AIzaSyAq51XKthrJStmjvDQNrkaG7i4zLseI490"
      node: 20
      xcode: 16.2
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci
      - name: Run Expo Prebuild
        script: |
          npx expo prebuild --platform ios --clean
      - name: Patch Podfile - SKIP_INSTALL for pods
        script: |
          cd ios
          sed -i '' '/react_native_post_install/i\
              installer.pods_project.targets.each do |target|\
                target.build_configurations.each do |config|\
                  config.build_settings["SKIP_INSTALL"] = "YES"\
                end\
              end
          ' Podfile
          echo "Podfile patched successfully"
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install
      - name: Set up keychain
        script: |
          keychain initialize
      - name: Add certificates to keychain
        script: |
          keychain add-certificates
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Build IPA
        script: |
          set -e
          echo "=== Signing identities in keychain ==="
          security find-identity -v -p codesigning || true
          echo "======================================"
          XCODE_WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 -print -quit)
          XCODE_SCHEME=$(xcodebuild -list -workspace "$XCODE_WORKSPACE" -json | python3 -c "import sys,json;s=json.load(sys.stdin)['workspace']['schemes'];skip=['AppAuth','Pods','GTMAppAuth','GoogleSignIn'];m=[x for x in s if x not in skip and not x.startswith('Pods-')];print(m[0] if m else s[0])")
          echo "Building: workspace=$XCODE_WORKSPACE scheme=$XCODE_SCHEME"
          mkdir -p build/ios/xcarchive build/ios/ipa
          xcodebuild archive \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/ios/xcarchive/app.xcarchive \
            -destination "generic/platform=iOS" \
            COMPILER_INDEX_STORE_ENABLE=NO
          echo "Archive succeeded, starting export..."
          /usr/libexec/PlistBuddy -c "Add :destination string export" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :stripSwiftSymbols bool true" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :compileBitcode bool false" /tmp/ExportOptions.plist
          xcodebuild -exportArchive \
            -archivePath build/ios/xcarchive/app.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            COMPILER_INDEX_STORE_ENABLE=NO
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
