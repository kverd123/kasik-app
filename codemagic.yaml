workflows:
  # === iOS Build & App Store Submit ===
  ios-production:
    name: iOS Production
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      ios_signing:
        provisioning_profiles:
          - profile: kasik
        certificates:
          - certificate: kasik
      vars:
        BUNDLE_ID: "com.kasik.ekgida"
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          npm ci
      - name: Set up Expo
        script: |
          npx expo prebuild --platform ios --clean
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Find workspace and scheme
        script: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" -json | python3 -c "import sys,json; print(json.load(sys.stdin)['workspace']['schemes'][0])")
          echo "WORKSPACE=$WORKSPACE" >> $CM_ENV
          echo "SCHEME=$SCHEME" >> $CM_ENV
          echo "Using workspace: $WORKSPACE, scheme: $SCHEME"
      - name: Create export options
        script: |
          cat > /tmp/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${CODE_SIGN_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.kasik.ekgida</key>
              <string>${CM_PROVISIONING_PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          PLIST
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$SCHEME" \
            --export-options-plist /tmp/ExportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  # === Android Build & Google Play Submit ===
  android-production:
    name: Android Production
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      groups:
        - google_play_credentials
      vars:
        PACKAGE_NAME: "com.kasik.ekgida"
      node: 20
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          npm ci
      - name: Set up Expo
        script: |
          npx expo prebuild --platform android --clean
      - name: Build Android AAB
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
