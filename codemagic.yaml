workflows:
  # === iOS Build & App Store Submit ===
  ios-production:
    name: iOS Production
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.kasik.ekgida
      vars:
        BUNDLE_ID: "com.kasik.ekgida"
      node: 20
      xcode: 16.2
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          npm ci
      - name: Set up Expo
        script: |
          npx expo prebuild --platform ios --clean
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Find workspace and scheme
        script: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" -json | python3 -c "import sys,json; print(json.load(sys.stdin)['workspace']['schemes'][0])")
          echo "WORKSPACE=$WORKSPACE" >> $CM_ENV
          echo "SCHEME=$SCHEME" >> $CM_ENV
      - name: Build iOS archive
        script: |
          xcodebuild -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/ios/KasikApp.xcarchive \
            archive \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$APP_STORE_CONNECT_PRIVATE_KEY" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            | xcpretty || true
      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath build/ios/KasikApp.xcarchive \
            -exportPath build/ios/ipa \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$APP_STORE_CONNECT_PRIVATE_KEY" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            COMPILER_INDEX_STORE_ENABLE=NO
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  # === Android Build & Google Play Submit ===
  android-production:
    name: Android Production
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      groups:
        - google_play_credentials
      vars:
        PACKAGE_NAME: "com.kasik.ekgida"
      node: 20
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          npm ci
      - name: Set up Expo
        script: |
          npx expo prebuild --platform android --clean
      - name: Build Android AAB
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
