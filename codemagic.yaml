workflows:
  # === iOS Build & TestFlight ===
  ios-production:
    name: iOS Production
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.kasik.ekgida
      groups:
        - certificate_credentials
      vars:
        BUNDLE_ID: "com.kasik.ekgida"
        EXPO_PUBLIC_FIREBASE_API_KEY: "AIzaSyBkgx0FNXB2bX6AmkU4eOM5VYVoIGEYsag"
        EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: "kasik-1f982.firebaseapp.com"
        EXPO_PUBLIC_FIREBASE_PROJECT_ID: "kasik-1f982"
        EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: "kasik-1f982.firebasestorage.app"
        EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "95500135299"
        EXPO_PUBLIC_FIREBASE_APP_ID: "1:95500135299:ios:a2a3d3e5f6g7h8i9"
        EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID: "95500135299-d1s02fuebgd5hahrsblla2b4g09p3lk8.apps.googleusercontent.com"
        EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: "95500135299-d1s02fuebgd5hahrsblla2b4g09p3lk8.apps.googleusercontent.com"
        EXPO_PUBLIC_ADMOB_APP_ID_IOS: "ca-app-pub-8099877386187148~1136119394"
        EXPO_PUBLIC_ADMOB_BANNER_ID_IOS: "ca-app-pub-8099877386187148/3160748553"
        EXPO_PUBLIC_ADMOB_INTERSTITIAL_ID_IOS: "ca-app-pub-8099877386187148/2055416996"
        EXPO_PUBLIC_REVENUECAT_API_KEY: "appl_kOTQHVFKEfnenNdYfeQyYpHBVSM"
      node: 20
      xcode: 16.2
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci
      - name: Run Expo Prebuild
        script: |
          npx expo prebuild --platform ios --clean
      - name: Patch Podfile - SKIP_INSTALL for pods
        script: |
          cd ios
          sed -i '' '/react_native_post_install/i\
              installer.pods_project.targets.each do |target|\
                target.build_configurations.each do |config|\
                  config.build_settings["SKIP_INSTALL"] = "YES"\
                end\
              end
          ' Podfile
          echo "Podfile patched successfully"
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install
      - name: Set up keychain
        script: |
          keychain initialize
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
      - name: Add certificates to keychain
        script: |
          keychain add-certificates
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Find workspace and scheme
        script: |
          XCODE_WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 -print -quit)
          XCODE_SCHEME=$(xcodebuild -list -workspace "$XCODE_WORKSPACE" -json | python3 -c "import sys,json; print(json.load(sys.stdin)['workspace']['schemes'][0])")
          echo "XCODE_WORKSPACE=$XCODE_WORKSPACE" >> $CM_ENV
          echo "XCODE_SCHEME=$XCODE_SCHEME" >> $CM_ENV
          echo "Found workspace: $XCODE_WORKSPACE, scheme: $XCODE_SCHEME"
      - name: Build archive with xcodebuild
        script: |
          xcodebuild -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/ios/kasik.xcarchive \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates \
            archive \
            COMPILER_INDEX_STORE_ENABLE=NO
      - name: Export IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-path build/ios/kasik.xcarchive
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  # === Android Build & Google Play ===
  android-production:
    name: Android Production
    max_build_duration: 120
    instance_type: linux_x2
    environment:
      groups:
        - google_play_credentials
      vars:
        PACKAGE_NAME: "com.kasik.ekgida"
      node: 20
      java: 17
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci
      - name: Run Expo Prebuild
        script: |
          npx expo prebuild --platform android --clean
      - name: Build Android AAB
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
