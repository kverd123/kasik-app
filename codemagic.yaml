workflows:
  # === iOS Build & TestFlight ===
  ios-production:
    name: iOS Production
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.kasik.ekgida
      groups:
        - app_credentials
      vars:
        BUNDLE_ID: "com.kasik.ekgida"
      node: 20
      xcode: 16.2
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci
      - name: Run Expo Prebuild
        script: |
          npx expo prebuild --platform ios --clean
      - name: Patch Podfile - SKIP_INSTALL for pods
        script: |
          cd ios
          sed -i '' '/react_native_post_install/i\
              installer.pods_project.targets.each do |target|\
                target.build_configurations.each do |config|\
                  config.build_settings["SKIP_INSTALL"] = "YES"\
                end\
              end
          ' Podfile
          echo "Podfile patched successfully"
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install
      - name: Set up keychain
        script: |
          keychain initialize
      - name: Add certificates to keychain
        script: |
          keychain add-certificates
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Build IPA
        script: |
          set -e
          echo "=== Signing identities in keychain ==="
          security find-identity -v -p codesigning || true
          echo "======================================"
          XCODE_WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 -print -quit)
          XCODE_SCHEME=$(xcodebuild -list -workspace "$XCODE_WORKSPACE" -json | python3 -c "import sys,json;s=json.load(sys.stdin)['workspace']['schemes'];skip=['AppAuth','Pods','GTMAppAuth','GoogleSignIn'];m=[x for x in s if x not in skip and not x.startswith('Pods-')];print(m[0] if m else s[0])")
          echo "Building: workspace=$XCODE_WORKSPACE scheme=$XCODE_SCHEME"
          mkdir -p build/ios/xcarchive build/ios/ipa
          xcodebuild archive \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/ios/xcarchive/app.xcarchive \
            -destination "generic/platform=iOS" \
            COMPILER_INDEX_STORE_ENABLE=NO
          echo "Archive succeeded, starting export..."
          cat > /tmp/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>destination</key>
            <string>export</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath build/ios/xcarchive/app.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates \
            COMPILER_INDEX_STORE_ENABLE=NO
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
